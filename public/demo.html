<div style="display:flex; gap:15px; margin-bottom:20px; flex-wrap:wrap;">

    <!-- Time -->
    <div style="flex:1; min-width:250px;">
      <label style="display:block; margin-bottom:6px; font-size:14px; font-weight:500;">
        Time
      </label>
  
      <div style="display:flex; gap:8px;">
  
        <!-- Hour -->
        <select
          style="
            flex:1;
            height:42px;
            border:1px solid #ced4da;
            border-radius:6px;
            padding:0 10px;
            font-size:14px;
            outline:none;
          "
        >
          <option>HH</option>
          <option>01</option>
          <option>02</option>
          <option>03</option>
          <option>04</option>
          <option>05</option>
          <option>06</option>
          <option>07</option>
          <option>08</option>
          <option>09</option>
          <option>10</option>
          <option>11</option>
          <option>12</option>
        </select>
  
        <!-- Minute -->
        <select
          style="
            flex:1;
            height:42px;
            border:1px solid #ced4da;
            border-radius:6px;
            padding:0 10px;
            font-size:14px;
            outline:none;
          "
        >
          <option>MM</option>
          <option>00</option>
          <option>05</option>
          <option>10</option>
          <option>15</option>
          <option>20</option>
          <option>25</option>
          <option>30</option>
          <option>35</option>
          <option>40</option>
          <option>45</option>
          <option>50</option>
          <option>55</option>
        </select>
  
        <!-- AM PM -->
        <select
          style="
            width:90px;
            height:42px;
            border:1px solid #ced4da;
            border-radius:6px;
            padding:0 10px;
            font-size:14px;
            outline:none;
          "
        >
          <option>AM</option>
          <option>PM</option>
        </select>
  
      </div>
    </div>
  
    <!-- Date -->
    <div style="flex:1; min-width:250px;">
      <label style="display:block; margin-bottom:6px; font-size:14px; font-weight:500;">
        Date
      </label>
  
      <input
        type="date"
        style="
          width:100%;
          height:42px;
          border:1px solid #ced4da;
          border-radius:6px;
          padding:0 12px;
          font-size:14px;
          outline:none;
          box-sizing:border-box;
        "
      />
    </div>
  
  </div>
