<!DOCTYPE html>
<html lang="hi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mahadev Lottery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <style>
    body {
      margin: 0;
      background: #f4f6fb;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #0b2a7a;
    }

    .hero {
      position: relative;
      min-height: 540px;
      background-image: url('/ram.jpeg');
      background-position: center 25%;
      background-size: cover;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.45) 0%, rgba(0, 0, 0, 0.07) 100%);
    }

    .hero-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: flex-end;
      padding: 14px 18px;
    }

    .online-badge {
      color: #fff;
      font-size: 0.92rem;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      padding: 8px 16px;
      letter-spacing: 0.04em;
    }

    .hero-line {
      position: relative;
      z-index: 1;
      height: 54px;
      background: #0b2a7f;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    .hero-line span {
      color: #fff;
      font-size: 1rem;
      letter-spacing: 0.22em;
      font-weight: 700;
      text-transform: uppercase;
    }

    .page-shell {
      /* max-width: 1180px; */
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .hero-box {
      /* background: #fff;
      border-radius: 16px; */
      padding: 26px 24px 20px;
      margin-top: -40px;
      /* box-shadow: 0 24px 52px rgba(0, 0, 0, 0.16); */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero-box .label {
      background: #0c2f98;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 10px 22px;
      border-radius: 10px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .pot-wrap {
      width: 176px;
      height: 176px;
      background: url('/pot-removebg-preview.png') center/contain no-repeat;
      background-size: contain;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .pot-value {
      font-size: 3.7rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 3px 16px rgba(0, 0, 0, 0.34);
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #0c2f98;
      color: #fff;
      border-radius: 12px;
      padding: 10px 18px;
      font-weight: 700;
      letter-spacing: 0.03em;
      min-width: 124px;
      text-transform: uppercase;
    }

    .table-panel {
      background: #0b2a7f;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 24px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
    }

    .table-panel table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    .table-panel th,
    .table-panel td {
      padding: 14px 10px;
      text-align: center;
      color: #fff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 0.95rem;
    }

    .table-panel th {
      background: #0c2f98;
      font-weight: 700;
      text-transform: uppercase;
    }

    .table-panel tbody tr {
      background: rgba(255, 255, 255, 0.03);
    }

    .table-panel tbody tr:last-child td {
      border-bottom: none;
    }

    .chart-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 26px 0 14px;
    }

    .chart-actions select,
    .chart-actions button {
      border-radius: 10px;
      border: none;
      font-size: 0.98rem;
      padding: 10px 16px;
    }

    .chart-actions select {
      min-width: 118px;
      border: 1px solid #0c2f98;
      background: #fff;
      color: #0b2a7a;
    }

    .chart-actions button {
      background: #0c2f98;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
    }

    .chart-title {
      background: #0c2f98;
      color: #fff;
      padding: 10px 0;
      border-radius: 6px;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .chart-wrap {
      background: #0b2a7f;
      border-radius: 5px;
      overflow: auto;
      padding: 10px;
    }

    .chart-table {
      width: max-content;
      border-collapse: collapse;
      font-size: 10.2px;
      letter-spacing: 0.02em;
    }

    .chart-table th,
    .chart-table td {
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 6px 8px;
      color: #fff;
      text-align: center;
      min-width: 36px;
    }

    .chart-table th {
      background: #0c2f98;
      font-weight: 700;
    }

    .chart-table tbody tr:nth-child(odd) td {
      background: rgba(255, 255, 255, 0.03);
    }

    .footer-card {
      max-width: 1180px;
      margin: 26px auto 36px;
      border: 2px solid #0c2f98;
      border-radius: 12px;
      background: #fff;
      color: #0b2a7a;
      text-align: center;
      font-size: 1.55rem;
      font-weight: 700;
      padding: 16px 10px;
    }

    @media (max-width: 992px) {
      .hero {
        min-height: 360px;
      }

      .table-panel table {
        min-width: 650px;
      }
    }

    @media (max-width: 768px) {
      .hero-line {
        height: 48px;
      }

      .hero-box {
        margin-top: -26px;
        padding: 18px 16px;
      }

      .pot-wrap {
        width: 150px;
        height: 150px;
      }

      .pot-value {
        font-size: 3.1rem;
      }

      .table-panel th,
      .table-panel td {
        padding: 10px 8px;
      }

      .chart-actions {
        flex-direction: column;
        gap: 12px;
      }

      .chart-wrap {
        padding: 8px;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="hero-top"><span class="online-badge">online : 9208</span></div>
    <div class="hero-line"><span>LOTTERY</span></div>
  </section>

  <main class="page-shell">
    <section class="hero-box">
      <div class="label">MAHADEV LOTTERY</div>
      <div class="pot-wrap">
        <div class="pot-value" id="liveResult">wait..</div>
      </div>
      <div class="live-pill" id="liveTime"></div>
    </section>

    <section class="table-panel">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>S.no</th>
              <th>Game</th>
              <th>Time</th>
              <th>Old</th>
              <th>New</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </section>

    <div class="chart-actions">
      <select id="yearSelect"></select>
      <button id="chartGo">Go</button>
    </div>

    <div class="chart-title">MAHADEV LOTTERY CHART</div>
    <div class="chart-wrap" id="chartWrap"></div>

    <div class="footer-card">36 Jodi</div>
  </main>

  <script>
    function mapApiRow(r) {
      return {
        sno: r.sno,
        time: r.time,
        old: r.oldResult || '---',
        new: r.newResult || 'wait..'
      };
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function timeToMinutes(timeStr) {
      const match = (timeStr || '').trim().match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
      if (!match) return -1;
      let hours = parseInt(match[1], 10);
      const minutes = parseInt(match[2], 10);
      const ampm = match[3].toUpperCase();
      if (hours === 12) {
        hours = ampm === 'AM' ? 0 : 12;
      } else if (ampm === 'PM') {
        hours += 12;
      }
      return hours * 60 + minutes;
    }

    /** Pot: latest declared result by clock time (not S.NO). */
    function getLatestResultByTime(rows) {
      let best = null;
      let bestMinutes = -1;
      for (const row of rows) {
        if (!row.new || row.new.toLowerCase() === 'wait..') continue;
        const mins = timeToMinutes(row.time);
        if (mins < 0) continue;
        if (!best || mins > bestMinutes || (mins === bestMinutes && row.sno > best.sno)) {
          bestMinutes = mins;
          best = row;
        }
      }
      return best;
    }

    function updateLiveClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const suffix = hours >= 12 ? 'PM' : 'AM';
      hours = ((hours + 11) % 12) + 1;
      document.getElementById('liveTime').textContent =
        `${hours.toString().padStart(2, '0')}:${minutes} ${suffix}`;
    }

    async function loadYearOptions() {
      const select = document.getElementById('yearSelect');
      try {
        const res = await fetch('/api/chart/years');
        if (!res.ok) throw new Error('years unavailable');
        const years = await res.json();
        select.innerHTML = years.map(y => `<option value="${escapeHtml(y)}">${escapeHtml(y)}</option>`).join('');
      } catch (e) {
        const y = new Date().getFullYear();
        select.innerHTML = `<option value="${y}">${y}</option>`;
      }
    }

    async function renderResults() {
      const tbody = document.getElementById('resultsBody');
      try {
        const response = await fetch('/api/results');
        if (!response.ok) throw new Error('API not available');
        const dbRows = await response.json();

        if (!dbRows.length) {
          tbody.innerHTML = '<tr><td colspan="5">No results available</td></tr>';
          document.getElementById('liveResult').textContent = 'wait..';
          return;
        }

        const rows = dbRows.map(mapApiRow).sort((a, b) => a.sno - b.sno);

        tbody.innerHTML = rows.map(r => `
          <tr>
            <td>${escapeHtml(r.sno)}</td>
            <td>MAHADEV LOTTERY</td>
            <td>${escapeHtml(r.time)}</td>
            <td>${escapeHtml(r.old)}</td>
            <td style="${r.new.toLowerCase() !== 'wait..' ? 'color: #ffeb3b; font-weight: bold;' : ''}">${escapeHtml(r.new)}</td>
          </tr>
        `).join('');

        const latestRow = getLatestResultByTime(rows);
        document.getElementById('liveResult').textContent =
          latestRow ? (latestRow.new || 'wait..') : 'wait..';
      } catch (error) {
        console.error('Failed to fetch results:', error);
        tbody.innerHTML = '<tr><td colspan="5">Unable to load results</td></tr>';
        document.getElementById('liveResult').textContent = 'wait..';
      }
    }

    async function renderChart() {
      const chartWrap = document.getElementById('chartWrap');
      const year = document.getElementById('yearSelect').value;
      chartWrap.innerHTML = '<p style="color:#fff;text-align:center;padding:16px;">Loading chart…</p>';

      try {
        const res = await fetch(`/api/chart?year=${encodeURIComponent(year)}`);
        if (!res.ok) throw new Error('Chart API not available');
        const { headers, rows } = await res.json();

        if (!rows || !rows.length) {
          chartWrap.innerHTML = '<p style="color:#fff;text-align:center;padding:16px;">No chart data for this year</p>';
          return;
        }

        let html = '<table class="chart-table"><thead><tr>'
          + headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')
          + '</tr></thead><tbody>';
        rows.forEach(row => {
          html += '<tr>' + row.map(cell => `<td>${escapeHtml(cell)}</td>`).join('') + '</tr>';
        });
        html += '</tbody></table>';
        chartWrap.innerHTML = html;
      } catch (e) {
        console.error(e);
        chartWrap.innerHTML = '<p style="color:#fff;text-align:center;padding:16px;">Unable to load chart</p>';
      }
    }

    document.getElementById('chartGo').addEventListener('click', renderChart);

    updateLiveClock();
    setInterval(updateLiveClock, 1000);

    (async () => {
      await loadYearOptions();
      await renderResults();
      await renderChart();
      setInterval(renderResults, 10000);// 30 s
    })();
  </script>
</body>

</html>
